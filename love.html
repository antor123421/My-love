<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miss You</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            height: 100vh;
            user-select: none;
        }

        /* লিকুইড গ্লাস লোডিং স্ক্রিন */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease;
        }
        .liquid-glass {
            position: relative;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            border: 4px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .liquid-glass::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45px, #ff2a74, #ff758c);
            border-radius: 40%;
            animation: liquid 4s linear infinite;
        }
        .loader-text {
            position: relative;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
            z-index: 10;
        }
        @keyframes liquid {
            0% { transform: translate(-25%, -25%) rotate(0deg); }
            100% { transform: translate(-25%, -25%) rotate(360deg); }
        }

        /* মেইন কন্টেন্ট এরিয়া (অ্যানিমেশন) */
        #main-content {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #111, #000);
        }

        /* উপর থেকে পড়া এলিমেন্টগুলোর স্টাইল (21743.jpg এর মতো গ্লোয়িং ইফেক্ট) */
        .falling-item {
            position: absolute;
            top: -150px;
            pointer-events: none;
            animation: fall linear infinite;
        }
        .falling-text {
            color: rgba(255, 255, 255, 0.9);
            font-size: 24px;
            font-weight: bold;
            white-space: nowrap;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.8), 0 0 20px rgba(255, 42, 116, 0.6);
            font-family: 'Courier New', Courier, monospace;
        }
        .falling-emoji {
            font-size: 30px;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.8));
        }
        .falling-image {
            width: 70px;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            opacity: 0.85;
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(20deg);
                opacity: 0;
            }
        }

        /* ব্যাকগ্রাউন্ড মিউজিক বাটন (যদি অটো-প্লে ব্লক হয়) */
        #music-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
<body onclick="playMusic()">

    <!-- অডিও ট্যাগ (এখানে আপনার রোমান্টিক গানের ফাইল নাম দিন) -->
    <audio id="romanticSong" loop>
        <source src="romantic-song.mp3" type="audio/mpeg">
    </audio>

    <!-- লিকুইড গ্লাস লোডার স্ক্রিন -->
    <div id="loader">
        <div class="liquid-glass">
            <span class="loader-text">Loading...</span>
        </div>
    </div>

    <!-- মেইন কন্টেন্ট স্ক্রিন -->
    <div id="main-content"></div>

    <button id="music-btn">🎵 Play Music</button>

    <script>
        // ৩ সেকেন্ড পর লোডার রিমুভ করার জন্য
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 1000);
                
                // উপাদানগুলো পড়া শুরু করবে
                startFallingEffect();
            }, 3000); 
        });

        // গান বাজানোর ফাংশন
        function playMusic() {
            const song = document.getElementById('romanticSong');
            song.play().catch(error => console.log("Autoplay prevented. Click to play."));
        }

        // র্যান্ডম এলিমেন্ট তৈরি এবং উপর থেকে ফেলার ফাংশন
        function startFallingEffect() {
            const container = document.getElementById('main-content');
            
            // কি কি জিনিস পড়বে তার লিস্ট
            const types = ['text', 'emoji', 'image'];

            setInterval(() => {
                const item = document.createElement('div');
                item.classList.add('falling-item');
                
                // র্যান্ডম টাইপ সিলেক্ট করা
                const randomType = types[Math.floor(Math.random() * types.length)];
                
                if (randomType === 'text') {
                    item.innerHTML = `<span class="falling-text">I Miss You</span>`;
                } else if (randomType === 'emoji') {
                    item.innerHTML = `<span class="falling-emoji">❤️</span>`;
                } else if (randomType === 'image') {
                    // এখানে আপনার দেওয়া দ্বিতীয় ছবি "21885.jpg" লোড হবে
                    item.innerHTML = `<img src="21885.jpg" class="falling-image" alt="love">`;
                }

                // স্ক্রিনের যেকোনো র্যান্ডম জায়গায় (বাম থেকে ডানে) পজিশন দেওয়া
                item.style.left = Math.random() * 100 + 'vw';
                
                // পড়ার গতি র্যান্ডম করা (৪ থেকে ৮ সেকেন্ডের মধ্যে)
                const duration = Math.random() * 4 + 4;
                item.style.animationDuration = duration + 's';
                
                // সাইজ একটু ছোট-বড় করা র্যান্ডমলি
                const scale = Math.random() * 0.4 + 0.8;
                item.style.transform = `scale(${scale})`;

                container.appendChild(item);

                // অ্যানিমেশন শেষ হলে মেমোরি খালি করার জন্য রিমুভ করে দেওয়া
                setTimeout(() => {
                    item.remove();
                }, duration * 1000);

            }, 300); // প্রতি ৩০০ মিলি-সেকেন্ড পর পর একটি করে নতুন জিনিস পড়বে
        }
    </script>
</body>
</html>
